server:
  port: 8080

spring:
  datasource:
    url: jdbc:h2:mem:brogress;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  liquibase:
    enabled: true
    change-log: classpath:/db/changelog/db.changelog-master.xml
  sql:
    init:
      mode: never
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
  h2:
    console:
      enabled: true

brogress:
  jwt:
    secret: "dev-only-change-me-use-at-least-256-bits-for-hs256-aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
    expiration-ms: 86400000
